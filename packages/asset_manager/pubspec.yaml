name: asset_manager
description: 도안 모델, 카테고리, 로컬 로드, 캐시. SVG/이미지 템플릿을 앱에 제공하는 패키지.
version: 0.1.0
publish_to: 'none'

environment:
  sdk: ^3.10.8
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  xml: ^6.0.0           # SVG 파싱
  path_parsing: ^1.1.0  # SVG path 파싱
  drawing_engine:
    path: ../drawing_engine

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# 포함 예정 코드 (마이그레이션 시 아래 파일 이동):
#   features/coloring/models/svg_template.dart
#   features/coloring/models/svg_coloring_parser.dart
#   features/coloring/models/coloring_path.dart
#   features/coloring/models/coloring_transform.dart
#   features/coloring/data/svg_template_registry.dart
#   features/trace_drawing/models/trace_template.dart
#   features/trace_drawing/models/trace_hitzone.dart
#   features/trace_drawing/data/trace_template_registry.dart

flutter:

  # To add assets to your package, add an assets section, like this:
