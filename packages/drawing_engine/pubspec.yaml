name: drawing_engine
description: 캔버스, 브러시, 채우기 알고리즘, 색상 팔레트, undo/redo 엔진. 모든 그림 앱의 핵심 패키지.
version: 0.1.0
publish_to: 'none'

environment:
  sdk: ^3.10.8
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  perfect_freehand: ^2.5.2+1  # 필압 스트로크
  vector_math: ^2.2.0          # 벡터 계산

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# 포함 예정 코드 (마이그레이션 시 아래 파일 이동):
#   shared/models/drawing_element.dart
#   shared/models/drawing_tool.dart
#   shared/models/drawing_mode.dart
#   shared/models/stroke.dart
#   shared/models/rainbow_stroke.dart
#   shared/models/sparkle_element.dart
#   shared/painters/stroke_painter_mixin.dart
#   core/constants/app_colors.dart
#   core/constants/tool_colors.dart
#   core/utils/palette_utils.dart
#   core/theme/app_theme.dart

