name: purchase
description: 인앱 결제, 상품 모델, 잠금 관리. Google Play / App Store 결제 연동 패키지.
version: 0.1.0
publish_to: 'none'

environment:
  sdk: ^3.10.8
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  in_app_purchase: ^3.0.0  # 구글 플레이 / 앱스토어 결제

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# 포함 예정 코드 (신규 작성 필요):
#   iap_manager.dart    - 인앱 결제 흐름 (구매 요청, 결과 수신, 복원)
#   product.dart        - 상품 모델 (ID, 가격, 설명)
#   lock_manager.dart   - 잠금/해제 상태 관리 (SharedPreferences 기반)
#
# 구현 시 참고:
#   - restorePurchases()로 재설치 후 결제 이력 복원
#   - PurchaseStatus.refunded 감지 → 잠금 재적용

