name: ui_kit
description: 공통 버튼, 다이얼로그, 테마. 여러 앱에서 재사용하는 UI 컴포넌트 패키지.
version: 0.1.0
publish_to: 'none'

environment:
  sdk: ^3.10.8
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  drawing_engine:
    path: ../drawing_engine

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# 포함 예정 코드 (마이그레이션 시 아래 파일 이동):
#   shared/widgets/animated_pressable.dart
#   shared/widgets/brush_size_selector.dart
#   shared/widgets/color_palette.dart
#   shared/widgets/drawing_toolbar.dart
#   shared/widgets/tool_selector.dart
#   shared/widgets/sparkle_object_widget.dart
#   shared/widgets/sparkle_shape_painter.dart

