name: user_progress
description: 갤러리, 즐겨찾기, 사용 기록. 사용자 완성 작품 및 진행 상태를 관리하는 패키지.
version: 0.1.0
publish_to: 'none'

environment:
  sdk: ^3.10.8
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  storage:
    path: ../storage

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# 포함 예정 코드 (마이그레이션 시 새로 작성):
#   gallery.dart      - 완성작 갤러리 (현재 features/gallery/ 미구현)
#   favorite.dart     - 즐겨찾기
#   history.dart      - 사용 기록

