name: storage
description: 로컬 저장, 이미지 저장, 앱 설정. SQLite 기반 드로잉 데이터 저장 및 파일 I/O 패키지.
version: 0.1.0
publish_to: 'none'

environment:
  sdk: ^3.10.8
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.4.1        # SQLite
  path_provider: ^2.1.5  # 파일 경로
  path: ^1.9.1           # 경로 처리
  share_plus: ^10.1.4    # 공유

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# 포함 예정 코드 (마이그레이션 시 아래 파일 이동):
#   shared/services/storage_service.dart
#   shared/services/export_service.dart
#   shared/services/share_service.dart
#   shared/models/drawing_data.dart

